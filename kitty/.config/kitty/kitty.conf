# Kitty configuration
# Migrated from WezTerm

# Terminal type - required for kitty graphics protocol
term xterm-kitty

# Font configuration
font_family GeistMono Nerd Font
font_size 13
modify_font cell_height 125%

# Window appearance
hide_window_decorations yes
window_padding_width 30

# Scrollback
scrollback_lines 10000
wheel_scroll_multiplier 10.0
touch_scroll_multiplier 12.0

# Cursor
cursor_beam_thickness 2
cursor_shape beam

# Mouse
mouse_hide_wait 3.0

# Shell
shell fish

# Disable confirm on close
confirm_os_window_close 0

# Tab bar (disabled like WezTerm)
tab_bar_style hidden

# kitty-scrollback.nvim
# Uses path relative to kitty config dir via the kitty-scrollback.nvim symlink,
# since kitty 0.46.2 broke absolute-path kitten resolution
# ("Out of buffer space calling sprintf at line: 300").
action_alias kitty_scrollback_nvim kitten kitty-scrollback.nvim/python/kitty_scrollback_nvim.py

# Keybindings
# Ctrl+S for scrollback/copy mode in nvim
map ctrl+s kitty_scrollback_nvim

# Ctrl+Shift+V paste
map ctrl+shift+v paste_from_clipboard

# Ctrl+Shift+R reload config
map ctrl+shift+r load_config_file

# Half-page scroll at the shell prompt; pass-through to alt-screen apps
# (nvim, less, claude TUI, …) so their native Ctrl+U/D still works.
map ctrl+u kitten half_page_scroll.py up
map ctrl+d kitten half_page_scroll.py down

# Allow remote control (for theme switching)
allow_remote_control yes
listen_on unix:/tmp/kitty-{kitty_pid}

# Include theme (will be generated by theme-manager)
include theme.conf
