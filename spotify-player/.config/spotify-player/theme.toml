[[themes]]
name = "custom"

[themes.palette]
background = "#FDF6E3"
foreground = "#2D4A3D"
black = "#F9F2DF"
red = "#ED333B"
green = "#5E7270"
yellow = "#69756C"
blue = "#286983"
magenta = "#B8713A"
cyan = "#4A7C59"
white = "#575279"
bright_black = "#EBE4D6"
bright_red = "#ED333B"
bright_green = "#5E7270"
bright_yellow = "#69756C"
